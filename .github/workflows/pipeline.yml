name: v9 NCAA Pipeline
on:
  schedule:
    - cron: '0 13 * * *'  # 7am CST daily
  workflow_dispatch:       # manual trigger

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      
      - name: Install dependencies
        run: npm ci || npm install
      
      - name: Run learning engine
        run: node scripts/learn.js
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      
      - name: Run pipeline
        run: node scripts/pipeline.js
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          IS_SCHEDULED: ${{ github.event_name == 'schedule' && 'true' || 'false' }}
      
      - name: Commit and push
        run: |
          git config user.name "NCAA Bot"
          git config user.email "62906980+mbangia630@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "v9 pipeline run $(date -u +%Y-%m-%dT%H:%M)"
          # Merge remote changes; on conflict, pipeline output always wins
          git fetch origin main
          git merge origin/main -X ours --no-edit || {
            # If merge still has conflicts, force-resolve with our pipeline data
            git checkout --ours -- data/ public/data/
            git add -A
            git commit --no-edit
          }
          git push
