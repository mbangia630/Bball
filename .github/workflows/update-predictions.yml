name: Update NCAA Predictions

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [manual-refresh]

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Fetch updated data
        run: node scripts/fetch-all-data.js
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

      - name: Self-improve from yesterday results
        run: node scripts/self-improve.js

      - name: Run predictions with updated weights
        run: node scripts/run-predictions.js

      - name: Generate delta report
        run: node scripts/delta-report.js
        env:
          IS_SCHEDULED: ${{ github.event_name == 'schedule' && 'true' || 'false' }}

      - name: Copy reports to public folder
        run: |
          mkdir -p public/data/reports
          cp -f data/reports/latest.json public/data/reports/latest.json 2>/dev/null || true
          cp -f data/reports/delta-latest.json public/data/reports/delta-latest.json 2>/dev/null || true
          cp -f data/predictions.json public/data/predictions.json 2>/dev/null || true

      - name: Commit and push
        run: |
          git config user.name "mbangia630"
          git config user.email "62906980+mbangia630@users.noreply.github.com"
          git add data/ public/
          git diff --staged --quiet || git commit -m "Auto-update predictions $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
